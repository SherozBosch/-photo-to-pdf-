name: photo_to_pdf
description: Merge photos into a single PDF document.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Image selection & processing
  image_picker: ^1.0.7
  image: ^4.1.7

  # PDF generation
  pdf: ^3.10.8

  # File system & storage
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  sqflite: ^2.3.2
  path: ^1.9.0

  # State management
  provider: ^6.1.2

  # Permissions
  permission_handler: ^11.3.0

  # Sharing
  share_plus: ^7.2.2

  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3

dev_dependencies:
  flutter_lints: ^3.0.1
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
