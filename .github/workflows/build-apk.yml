name: Build Android APK

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Generate Android project
        run: flutter create --platforms=android --project-name photo_to_pdf .

      - name: Add permissions to AndroidManifest
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          if ! grep -q "READ_MEDIA_IMAGES" "$MANIFEST"; then
            sed -i 's#<application#<uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28" />\n    <uses-permission android:name="android.permission.CAMERA" />\n\n    <application#' "$MANIFEST"
          fi

      - name: Harden Gradle config
        run: |
          KTS=android/app/build.gradle.kts
          GROOVY=android/app/build.gradle
          if [ -f "$KTS" ]; then
            sed -i 's/ndkVersion = flutter.ndkVersion/ndkVersion = "27.0.12077973"/' "$KTS"
            sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 23/' "$KTS"
            echo "----- $KTS -----"; cat "$KTS"
          fi
          if [ -f "$GROOVY" ]; then
            sed -i 's/ndkVersion flutter.ndkVersion/ndkVersion "27.0.12077973"/' "$GROOVY"
            sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 23/' "$GROOVY"
            echo "----- $GROOVY -----"; cat "$GROOVY"
          fi

      - name: Get dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: photo-to-pdf-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
